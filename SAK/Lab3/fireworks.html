<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab3</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            color: white;
        }
        
        canvas {
            display: block;
        }

        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            z-index: 10;
        }

        .control-group {
            margin-bottom: 10px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
        }

        input[type="range"] {
            width: 150px;
        }
    </style>
</head>
<body>

    <div id="controls">
        <div class="control-group">
            <label for="gravityRange">Grawitacja: <span id="gravityVal">0.05</span></label>
            <input type="range" id="gravityRange" min="0" max="0.2" step="0.01" value="0.05">
        </div>
        <div class="control-group">
            <label for="particleRange">Liczba cząsteczek: <span id="particleVal">100</span></label>
            <input type="range" id="particleRange" min="20" max="300" step="10" value="100">
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        class Particle {
            constructor(x, y, vx, vy, hue) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.hue = hue;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.0075;
                this.active = true;
            }

            update(gravity, canvasHeight) {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += gravity;
                this.vx *= 0.98;
                this.vy *= 0.98;

                this.alpha -= this.decay;
                if (this.alpha <= 0) {
                    this.active = false;
                }

                if (this.y >= canvasHeight) {
                    this.vy *= -0.6;
                    this.y = canvasHeight;
                }
            }

            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 50%, ${this.alpha})`;
                ctx.fill();
            }
        }

        class Firework {
            constructor(startX, startY, targetX, targetY, particleCount, isProjectile, gravity = 0) {
                this.x = startX;
                this.y = startY;
                this.targetX = targetX;
                this.targetY = targetY;
                this.particleCount = particleCount;
                this.hue = Math.random() * 360;
                this.exploded = false;
                this.active = true;
                this.isProjectile = isProjectile;

                if (this.isProjectile) {
                    this.flightTime = 60;
                    this.frames = 0;
                    this.vx = (targetX - startX) / this.flightTime;
                    this.vy = (targetY - startY - 0.5 * gravity * this.flightTime * this.flightTime) / this.flightTime;
                    this.rocketGravity = gravity;
                } else {
                    const speed = 8;
                    const dx = targetX - startX;
                    const dy = targetY - startY;
                    const distance = Math.hypot(dx, dy);
                    this.vx = (dx / distance) * speed;
                    this.vy = (dy / distance) * speed;
                    this.rocketGravity = 0;
                }
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.rocketGravity;

                if (this.isProjectile) {
                    this.frames++;
                    if (this.frames >= this.flightTime) {
                        this.exploded = true;
                        this.active = false;
                    }
                } else {
                    const distanceToTarget = Math.hypot(this.targetX - this.x, this.targetY - this.y);
                    if (distanceToTarget < 5) {
                        this.exploded = true;
                        this.active = false;
                    }
                }
            }

            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, 80%)`;
                ctx.fill();
            }

            explode() {
                const newParticles = [];
                for (let i = 0; i < this.particleCount; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 6 + 2;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    const pColor = this.hue + (Math.random() * 40 - 20); 
                    
                    newParticles.push(new Particle(this.x, this.y, vx, vy, pColor));
                }
                return newParticles;
            }
        }

        class FireworkShow {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                
                this.resize();
                window.addEventListener('resize', () => this.resize());

                this.particles = [];
                this.rockets = [];

                this.gravity = 0.05;
                this.particleCount = 100;

                this.setupEvents();
                
                setInterval(() => this.autoLaunch(), 1500);

                this.update();
            }

            resize() {
                this.width = this.canvas.width = window.innerWidth;
                this.height = this.canvas.height = window.innerHeight;
            }

            setupEvents() {
                this.canvas.addEventListener('click', (e) => {
                    const targetX = e.clientX;
                    const targetY = e.clientY;
                    const startX = Math.random() * this.width;
                    const startY = this.height;

                    this.rockets.push(new Firework(startX, startY, targetX, targetY, this.particleCount, true, this.gravity));
                });
            }

            autoLaunch() {
                const targetX = Math.random() * this.width;
                const targetY = Math.random() * (this.height / 2);
                const startX = targetX;
                const startY = this.height;

                this.rockets.push(new Firework(startX, startY, targetX, targetY, this.particleCount, false));
            }

            update() {
                this.ctx.globalCompositeOperation = 'source-over';
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                this.ctx.fillRect(0, 0, this.width, this.height);

                this.ctx.globalCompositeOperation = 'lighter';

                this.rockets.forEach(rocket => {
                    rocket.update();
                    rocket.draw(this.ctx);
                });

                this.rockets.forEach(rocket => {
                    if (rocket.exploded) {
                        const newParticles = rocket.explode();
                        this.particles.push(...newParticles);
                    }
                });

                this.particles.forEach(particle => {
                    particle.update(this.gravity, this.height);
                    particle.draw(this.ctx);
                });

                this.rockets = this.rockets.filter(r => r.active);
                this.particles = this.particles.filter(p => p.active);

                requestAnimationFrame(() => this.update());
            }

            setGravity(val) { this.gravity = val; }
            setParticleCount(val) { this.particleCount = val; }
        }

        const canvas = document.getElementById('canvas');
        const show = new FireworkShow(canvas);

        const gravityRange = document.getElementById('gravityRange');
        const gravityVal = document.getElementById('gravityVal');
        gravityRange.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            show.setGravity(val);
            gravityVal.textContent = val.toFixed(2);
        });

        const particleRange = document.getElementById('particleRange');
        const particleVal = document.getElementById('particleVal');
        particleRange.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            show.setParticleCount(val);
            particleVal.textContent = val;
        });

    </script>
</body>
</html>
